name: Daily Commit

on:
  schedule:
    - cron: '30 5 * * *' # Runs daily at 05:30 UTC
  workflow_dispatch: # Allows manual trigger

jobs:
  commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Make change
        run: |
          echo "Last run: $(date)" > last_run.txt
          
      - name: Commit and push
        run: |
          git config --global user.name "sujalsahu5082"
          git config --global user.email "sujalsahu5082@users.noreply.github.com"
          git add last_run.txt
          git commit -m "chore: daily automated contribution" || echo "No changes to commit"
          git push origin main